<!DOCTYPE html>

    <title>M.Connect | شحن باقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #ebf8ff;
            --accent-color: #ecc94b;
            --text-dark: #2d3748;
            --text-light: #718096;
            --bg-color: #f7fafc;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; }
        header { background-color: var(--white); padding: 1rem 2rem; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); letter-spacing: 1px; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; padding-bottom: 80px; }
        .card { background: var(--white); border-radius: var(--border-radius); padding: 2rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        h2 { color: var(--primary-color); margin-bottom: 1.5rem; text-align: center; font-weight: 800; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark); }
        input[type="text"], input[type="tel"], input[type="file"] { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        .btn { background-color: var(--primary-color); color: var(--white); border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-outline { background-color: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); margin-top: 1rem; }
        .packages-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .package-card { background: var(--white); border: 2px solid #e2e8f0; border-radius: var(--border-radius); padding: 1.5rem; text-align: center; cursor: pointer; }
        .package-price { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); margin-bottom: 1rem; }
        .package-details { list-style: none; margin-bottom: 1.5rem; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; font-weight: 600; }
        .alert-warning { background-color: #feebc8; color: #c05621; border: 1px solid #fbd38d; }
        .admin-number { font-size: 1.8rem; font-weight: 800; color: #e53e3e; text-align: center; letter-spacing: 2px; margin: 1rem 0; padding: 1rem; background: #fff5f5; border-radius: 8px; }
        .floating-support { position: fixed; bottom: 20px; left: 20px; background-color: #25D366; color: white; border-radius: 50px; padding: 12px 24px; text-decoration: none; font-weight: 800; z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">M.Connect</div>
        <div id="user-greeting" class="hidden" style="font-weight: 600; color: var(--primary-color);"></div>
    </header>

    <div class="container">
        <!-- قسم تسجيل الدخول -->
        <div id="login-section" class="card">
            <h2>تسجيل الدخول</h2>

                <button type="submit" class="btn" id="login-btn">دخول</button>
            </form>
        </div>

        <div id="packages-section" class="hidden">

            <div class="packages-grid" id="packages-container"></div>
        </div>

        <div id="checkout-section" class="card hidden">
            <h2>تأكيد الطلب</h2>

            <button class="btn" id="btn-confirm-package">متابعة للدفع</button>
        </div>

        <div id="payment-section" class="card hidden">
            <h2>الدفع</h2>

            <form id="payment-form">

                <button type="submit" class="btn" id="btn-submit-order">تأكيد الطلب</button>
            </form>
        </div>

        <div id="success-section" class="card hidden">
            <div class="alert" style="background: #c6f6d5; color: #2f855a;">تم إرسال طلبك بنجاح!</div>
            <button class="btn" onclick="location.reload()">الرئيسية</button>

    </div>
